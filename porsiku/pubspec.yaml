name: porsiku
description: A new Flutter project.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  http: ^0.13.6
  flutter_spinkit: ^5.1.0
  flutter_secure_storage: ^9.0.0
  cupertino_icons: ^1.0.8
  carousel_slider: ^5.0.0

  # Scan & capture
  image_picker: ^1.1.2
  camera: ^0.11.1
  permission_handler: ^11.2.0
  gal: ^2.3.1
  shared_preferences: ^2.5.3
  http_parser: ^4.1.2

  # GUNAKAN SALAH SATU:
  # Jika ingin pakai dari pub.dev:
  # record: ^4.0.0

  # Jika ingin pakai versi lokal yang sudah kamu modifikasi:
  record:
    path: ./record_fix

  path_provider: ^2.0.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
